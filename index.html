<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Season-by-season regenerative farming guide — care for your land with intention." />
  <meta name="theme-color" content="#4a7c59" id="theme-color-meta" />
  <title>Regen Farm — Seasonal Land Care Guide</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>

  <!-- Typed.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.1.0/typed.umd.js" defer></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/seasons.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body class="season--spring" data-active-season="spring">

  <!-- Loading overlay -->
  <div id="loading-overlay" aria-hidden="true">
    <div class="loading-inner">
      <div class="loading-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4"/>
          <path d="M24 8 C24 8 16 16 16 24 C16 32 24 36 24 40" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M24 8 C24 8 32 16 32 24 C32 32 24 36 24 40" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="loading-text">Reading the land&hellip;</p>
    </div>
  </div>

  <!-- SVG Icon Sprite -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="icon-shovel" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 20l3-3m0 0l8-8m-8 8l2-2"/>
      <path d="M17.5 3.5l3 3-8 8-3-3 8-8z"/>
      <path d="M6 17l-2 2 1 1 2-2"/>
    </symbol>
    <symbol id="icon-seedling" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22V12"/>
      <path d="M12 12C12 12 7 10 5 6C9 4 13 6 12 12Z"/>
      <path d="M12 12C12 12 17 10 19 6C15 4 11 6 12 12Z"/>
    </symbol>
    <symbol id="icon-compost" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="16" rx="8" ry="4"/>
      <path d="M12 16V8"/>
      <path d="M9 11C9 11 9 8 12 6C15 8 15 11 15 11"/>
      <path d="M7 14C5 13 4 11 5 9C7 8 9 10 9 10"/>
      <path d="M17 14C19 13 20 11 19 9C17 8 15 10 15 10"/>
    </symbol>
    <symbol id="icon-wheat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22V8"/>
      <path d="M9 8C9 8 9 5 12 3C15 5 15 8 15 8"/>
      <path d="M8 12C8 12 6 11 5 8C7 7 9 9 9 9"/>
      <path d="M16 12C16 12 18 11 19 8C17 7 15 9 15 9"/>
      <path d="M8 16C8 16 6 15 5 12C7 11 9 13 9 13"/>
      <path d="M16 16C16 16 18 15 19 12C17 11 15 13 15 13"/>
    </symbol>
    <symbol id="icon-droplet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L6 12C6 15.3 8.7 18 12 18C15.3 18 18 15.3 18 12L12 2Z"/>
    </symbol>
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2" x2="12" y2="4"/>
      <line x1="12" y1="20" x2="12" y2="22"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="2" y1="12" x2="4" y2="12"/>
      <line x1="20" y1="12" x2="22" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </symbol>
    <symbol id="icon-snowflake" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="2" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
      <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
      <line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/>
      <line x1="12" y1="6" x2="9" y2="9"/>
      <line x1="12" y1="6" x2="15" y2="9"/>
      <line x1="12" y1="18" x2="9" y2="15"/>
      <line x1="12" y1="18" x2="15" y2="15"/>
    </symbol>
    <symbol id="icon-leaf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 22C2 22 8 16 12 12C14 10 18 6 20 2C20 2 20 8 18 12C16 16 12 18 12 18L2 22Z"/>
      <path d="M12 12L6 18"/>
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </symbol>
    <symbol id="icon-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </symbol>
    <symbol id="icon-tool" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </symbol>
  </svg>

  <!-- Site Header / Navigation -->
  <header class="site-header" id="site-header">
    <nav class="season-nav" aria-label="Season navigation">
      <a href="#" class="site-logo" aria-label="Regen Farm home">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5"/>
          <path d="M16 28V16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M16 16C16 16 11 13 10 8C14 6 17 9 16 16Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M16 16C16 16 21 13 22 8C18 6 15 9 16 16Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Regen Farm</span>
      </a>

      <ul class="season-pills" role="list">
        <li>
          <button class="season-pill is-active" data-season="spring" aria-current="true">
            <span class="pill-dot"></span>Spring
          </button>
        </li>
        <li>
          <button class="season-pill" data-season="summer" aria-current="false">
            <span class="pill-dot"></span>Summer
          </button>
        </li>
        <li>
          <button class="season-pill" data-season="autumn" aria-current="false">
            <span class="pill-dot"></span>Autumn
          </button>
        </li>
        <li>
          <button class="season-pill" data-season="winter" aria-current="false">
            <span class="pill-dot"></span>Winter
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Main content — seasons are rendered here by renderer.js -->
  <main id="main-content">
    <div id="seasons-container"></div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <!-- Season Wheel -->
      <div class="season-wheel-wrap">
        <svg class="season-wheel" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="Season wheel navigation" role="img">
          <!-- Arcs drawn by JS -->
          <g id="wheel-arcs"></g>
          <!-- Center label -->
          <circle cx="100" cy="100" r="32" class="wheel-center"/>
          <text x="100" y="96" text-anchor="middle" class="wheel-year-label">The</text>
          <text x="100" y="112" text-anchor="middle" class="wheel-year-label">Year</text>
        </svg>
        <div class="wheel-season-labels" aria-hidden="true">
          <span class="wheel-label wheel-label--top" data-season="spring">Spring</span>
          <span class="wheel-label wheel-label--right" data-season="summer">Summer</span>
          <span class="wheel-label wheel-label--bottom" data-season="autumn">Autumn</span>
          <span class="wheel-label wheel-label--left" data-season="winter">Winter</span>
        </div>
      </div>

      <div class="footer-text">
        <p class="footer-tagline">Tend the land. Feed the future.</p>
        <p class="footer-sub">A guide to regenerative practice, season by season.</p>
      </div>
    </div>
  </footer>

  <!-- JS Modules -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
